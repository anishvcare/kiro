<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - WA CRM</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <div id="sidebarContainer"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title" id="welcomeMsg">Welcome back!</h1>
          <p class="page-subtitle">Here's your overview</p>
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-value" id="statContacts">—</div>
          <div class="stat-label">Total Contacts</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statLeads">—</div>
          <div class="stat-label">Leads Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statMessages">—</div>
          <div class="stat-label">Messages</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statConversion">—</div>
          <div class="stat-label">Conversion Rate</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statUnread">—</div>
          <div class="stat-label">Unread</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statCampaigns">—</div>
          <div class="stat-label">Campaigns</div>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom:16px;">Recent Leads</h3>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Stage</th>
                <th>Source</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="leadsTable">
              <tr><td colspan="5" class="empty-state">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="/shared.js"></script>
  <script>
    checkAuth();

    // Render sidebar
    document.getElementById('sidebarContainer').innerHTML = renderSidebar('inbox');

    // Welcome message
    const user = getUser();
    if (user) {
      document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.name}!`;
    }

    // Load dashboard
    async function loadDashboard() {
      try {
        const data = await api('/dashboard');
        document.getElementById('statContacts').textContent = data.total_contacts ?? 0;
        document.getElementById('statLeads').textContent = data.leads_today ?? 0;
        document.getElementById('statMessages').textContent = data.total_messages ?? 0;
        document.getElementById('statConversion').textContent = (data.conversion_rate ?? 0) + '%';
        document.getElementById('statUnread').textContent = data.unread_messages ?? 0;
        document.getElementById('statCampaigns').textContent = data.total_campaigns ?? 0;

        // Recent leads
        const leads = data.recent_leads || [];
        const tbody = document.getElementById('leadsTable');
        if (leads.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No recent leads</td></tr>';
        } else {
          tbody.innerHTML = leads.map(lead => `
            <tr>
              <td>${lead.contact?.name || lead.name || '—'}</td>
              <td>${lead.contact?.phone || lead.phone || '—'}</td>
              <td><span class="badge badge-info">${lead.stage?.name || lead.stage || '—'}</span></td>
              <td>${lead.source || '—'}</td>
              <td>${formatDate(lead.created_at)}</td>
            </tr>
          `).join('');
        }
      } catch (err) {
        showError('Failed to load dashboard data');
      }
    }

    loadDashboard();
  </script>
</body>
</html>

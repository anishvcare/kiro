<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - WA CRM</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <div id="sidebarContainer"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Settings</h1>
          <p class="page-subtitle">Configure your CRM settings</p>
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('general')">General</button>
        <button class="tab-btn" onclick="switchTab('ai')">AI Chatbot</button>
        <button class="tab-btn" onclick="switchTab('apikeys')">API Keys</button>
      </div>

      <!-- General Tab -->
      <div class="tab-panel active" id="tab-general">
        <div class="card">
          <h3 style="margin-bottom:16px;">Business Information</h3>
          <div class="form-group">
            <label class="form-label">Business Name</label>
            <input type="text" class="form-input" id="businessName" placeholder="Your Business Name">
          </div>
          <div class="form-group">
            <label class="form-label">Plan</label>
            <div style="padding:10px 14px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius);display:flex;justify-content:space-between;align-items:center;">
              <span id="currentPlan">—</span>
              <span class="badge badge-success">Active</span>
            </div>
          </div>
          <button class="btn btn-primary" onclick="saveGeneral()">Save Changes</button>
        </div>
      </div>

      <!-- AI Chatbot Tab -->
      <div class="tab-panel" id="tab-ai">
        <div class="card">
          <h3 style="margin-bottom:16px;">AI Chatbot Settings</h3>
          <div class="form-group">
            <label class="form-label">Enable AI Chatbot</label>
            <div class="toggle-wrapper">
              <div class="toggle" id="aiToggle" onclick="toggleAI()"></div>
              <span style="font-size:0.875rem;" id="aiStatus">Disabled</span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">System Prompt</label>
            <textarea class="form-textarea" id="aiPrompt" rows="5" placeholder="You are a helpful assistant for our business..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Knowledge Base</label>
            <textarea class="form-textarea" id="aiKnowledge" rows="4" placeholder="Add information about your business, products, services..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">AI Model</label>
            <select class="form-select" id="aiModel">
              <option value="gpt-4o-mini">GPT-4o Mini</option>
              <option value="gpt-4o">GPT-4o</option>
              <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
              <option value="claude-3-haiku">Claude 3 Haiku</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="saveAI()">Save AI Settings</button>
        </div>
      </div>

      <!-- API Keys Tab -->
      <div class="tab-panel" id="tab-apikeys">
        <div class="card">
          <h3 style="margin-bottom:16px;">API Configuration</h3>
          <div class="form-group">
            <label class="form-label">Evolution API URL</label>
            <input type="url" class="form-input" id="evolutionUrl" placeholder="https://your-evolution-api.com">
          </div>
          <div class="form-group">
            <label class="form-label">Evolution API Key</label>
            <input type="password" class="form-input" id="evolutionKey" placeholder="Your API key">
          </div>
          <div class="form-group">
            <label class="form-label">OpenAI API Key</label>
            <input type="password" class="form-input" id="openaiKey" placeholder="sk-...">
          </div>
          <button class="btn btn-primary" onclick="saveApiKeys()">Save API Keys</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/shared.js"></script>
  <script>
    checkAuth();
    document.getElementById('sidebarContainer').innerHTML = renderSidebar('settings');

    let aiEnabled = false;

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      event.target.classList.add('active');
    }

    function toggleAI() {
      aiEnabled = !aiEnabled;
      const toggle = document.getElementById('aiToggle');
      const status = document.getElementById('aiStatus');
      if (aiEnabled) {
        toggle.classList.add('active');
        status.textContent = 'Enabled';
      } else {
        toggle.classList.remove('active');
        status.textContent = 'Disabled';
      }
    }

    // Load settings
    async function loadSettings() {
      try {
        const data = await api('/settings');
        if (data) {
          document.getElementById('businessName').value = data.business_name || data.team?.name || '';
          document.getElementById('currentPlan').textContent = data.plan || data.team?.plan || 'Free';
          // AI settings
          if (data.ai_chatbot) {
            aiEnabled = data.ai_chatbot.is_enabled || false;
            if (aiEnabled) {
              document.getElementById('aiToggle').classList.add('active');
              document.getElementById('aiStatus').textContent = 'Enabled';
            }
            document.getElementById('aiPrompt').value = data.ai_chatbot.system_prompt || '';
            document.getElementById('aiKnowledge').value = data.ai_chatbot.knowledge_base || '';
            document.getElementById('aiModel').value = data.ai_chatbot.model || 'gpt-4o-mini';
          }
          // API keys
          if (data.evolution_api_url) document.getElementById('evolutionUrl').value = data.evolution_api_url;
          if (data.evolution_api_key) document.getElementById('evolutionKey').value = data.evolution_api_key;
          if (data.openai_api_key) document.getElementById('openaiKey').value = data.openai_api_key;
        }
      } catch (err) {
        // Settings may not exist yet
      }
    }

    async function saveGeneral() {
      try {
        await api('/settings', {
          method: 'POST',
          body: JSON.stringify({
            business_name: document.getElementById('businessName').value
          })
        });
        showSuccess('Settings saved');
      } catch (err) {
        showError(err.data?.message || 'Failed to save settings');
      }
    }

    async function saveAI() {
      try {
        await api('/settings/ai-chatbot', {
          method: 'POST',
          body: JSON.stringify({
            is_enabled: aiEnabled,
            system_prompt: document.getElementById('aiPrompt').value,
            knowledge_base: document.getElementById('aiKnowledge').value,
            model: document.getElementById('aiModel').value
          })
        });
        showSuccess('AI settings saved');
      } catch (err) {
        showError(err.data?.message || 'Failed to save AI settings');
      }
    }

    async function saveApiKeys() {
      try {
        await api('/settings/api-keys', {
          method: 'POST',
          body: JSON.stringify({
            evolution_api_url: document.getElementById('evolutionUrl').value,
            evolution_api_key: document.getElementById('evolutionKey').value,
            openai_api_key: document.getElementById('openaiKey').value
          })
        });
        showSuccess('API keys saved');
      } catch (err) {
        showError(err.data?.message || 'Failed to save API keys');
      }
    }

    loadSettings();
  </script>
</body>
</html>

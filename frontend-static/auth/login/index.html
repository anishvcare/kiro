<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - WA CRM</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1 class="auth-title">&#128172; WA CRM</h1>
      <p class="auth-subtitle">Sign in to your account</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" required placeholder="Your password">
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%; justify-content:center; margin-top:8px;">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/auth/register/">Register</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = '/inbox/';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorEl = document.getElementById('errorMsg');
      errorEl.style.display = 'none';

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.message || 'Login failed');
        }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/inbox/';
      } catch (err) {
        errorEl.textContent = err.message || 'Login failed. Please try again.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>

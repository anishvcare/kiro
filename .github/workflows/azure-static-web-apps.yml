name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - universal-delivery-platform
  workflow_dispatch:

# Public backend endpoints injected at build time (not secrets).
env:
  VITE_API_URL: https://localshop-api-apfydbbyape7bzfr.southindia-01.azurewebsites.net/api
  VITE_SOCKET_URL: https://localshop-api-apfydbbyape7bzfr.southindia-01.azurewebsites.net
  # Firebase web config for customer phone-OTP login. Set these as GitHub
  # repository secrets. If unset, phone login is gracefully hidden and users
  # fall back to business/staff email login.
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

jobs:
  build_and_deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        # Use npm install (not npm ci) so newly-added deps like `firebase`
        # resolve even before package-lock.json is regenerated locally.
        run: npm install

      - name: Build
        working-directory: ./frontend
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # We build ourselves (above), so point app_location straight at the built output.
          app_location: "frontend/dist"
          skip_app_build: true
